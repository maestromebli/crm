name: AI Nightly Quality

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:

concurrency:
  group: ai-nightly-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ai-quality:
    runs-on: ubuntu-latest
    env:
      AI_EVAL_MIN_PASS_RATE: "100"
      AI_EVAL_MIN_POSITIVE_AVG: "90"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run AI regression eval
        run: pnpm -s run ai:eval:regression -- --report ".artifacts/ai-regression-report.json"

      - name: Publish AI eval summary
        if: always()
        shell: bash
        run: |
          if [ ! -f ".artifacts/ai-regression-report.json" ]; then
            echo "## AI Nightly Quality" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Звіт не згенеровано (скрипт завершився до запису report)." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('.artifacts/ai-regression-report.json','utf8'));const s=process.env.GITHUB_STEP_SUMMARY;const lines=[];lines.push('## AI Nightly Quality');lines.push('');lines.push('- passRate: '+r.metrics.passRate+'%');lines.push('- positiveAvgScore: '+r.metrics.positiveAvgScore);lines.push('- threshold passRate >= '+r.thresholds.minPassRate+'%');lines.push('- threshold positiveAvgScore >= '+r.thresholds.minPositiveAvg);lines.push('');lines.push('| Case | Score | Expected pass | Actual pass | Status |');lines.push('|---|---:|:---:|:---:|:---:|');for(const row of r.rows){lines.push('| '+row.id+' | '+row.score+' | '+row.expectedPass+' | '+row.actualPass+' | '+(row.ok?'PASS':'FAIL')+' |');}fs.appendFileSync(s,lines.join('\n')+'\n');"

      - name: Upload AI eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-nightly-quality-${{ github.run_id }}
          path: |
            .artifacts/ai-regression-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Alert to Slack on failure
        if: failure() && secrets.AI_ALERT_SLACK_WEBHOOK != ''
        env:
          WEBHOOK: ${{ secrets.AI_ALERT_SLACK_WEBHOOK }}
          MSG: >-
            AI Nightly Quality failed in ${{ github.repository }} on branch
            ${{ github.ref_name }}. Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(node -e "process.stdout.write(JSON.stringify({text: process.env.MSG}))")"
          curl -sS -X POST -H "Content-Type: application/json" --data "$payload" "$WEBHOOK"

      - name: Alert to Telegram on failure
        if: failure() && secrets.AI_ALERT_TELEGRAM_BOT_TOKEN != '' && secrets.AI_ALERT_TELEGRAM_CHAT_ID != ''
        env:
          TG_BOT_TOKEN: ${{ secrets.AI_ALERT_TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.AI_ALERT_TELEGRAM_CHAT_ID }}
          MSG: >-
            AI Nightly Quality failed in ${{ github.repository }} on branch
            ${{ github.ref_name }}. Run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}"
