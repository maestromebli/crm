name: E2E Lead Hub Critical

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: e2e-lead-hub-critical-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lead-hub-critical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check required E2E secrets
        id: preflight
        shell: bash
        env:
          SCREENSHOT_BASE_URL: ${{ secrets.SCREENSHOT_BASE_URL }}
          SCREENSHOT_EMAIL: ${{ secrets.SCREENSHOT_EMAIL }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_PASSWORD }}
          SCREENSHOT_VIEWER_EMAIL: ${{ secrets.SCREENSHOT_VIEWER_EMAIL }}
          SCREENSHOT_VIEWER_PASSWORD: ${{ secrets.SCREENSHOT_VIEWER_PASSWORD }}
        run: |
          missing=0
          for key in \
            SCREENSHOT_BASE_URL \
            SCREENSHOT_EMAIL \
            SCREENSHOT_PASSWORD \
            SCREENSHOT_VIEWER_EMAIL \
            SCREENSHOT_VIEWER_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browser
        if: steps.preflight.outputs.ready == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run critical Lead Hub E2E
        if: steps.preflight.outputs.ready == 'true'
        run: pnpm exec playwright test tests/e2e/lead-hub-notes-stage-transition.spec.ts tests/e2e/lead-hub-notes-rbac.spec.ts tests/e2e/lead-hub-notes-rbac-api.spec.ts --reporter=github,html --trace=retain-on-failure --video=retain-on-failure --screenshot=only-on-failure
        env:
          SCREENSHOT_SKIP_SERVER: "1"
          SCREENSHOT_BASE_URL: ${{ secrets.SCREENSHOT_BASE_URL }}
          SCREENSHOT_EMAIL: ${{ secrets.SCREENSHOT_EMAIL }}
          SCREENSHOT_PASSWORD: ${{ secrets.SCREENSHOT_PASSWORD }}
          SCREENSHOT_VIEWER_EMAIL: ${{ secrets.SCREENSHOT_VIEWER_EMAIL }}
          SCREENSHOT_VIEWER_PASSWORD: ${{ secrets.SCREENSHOT_VIEWER_PASSWORD }}

      - name: Upload Playwright report and artifacts
        if: always() && steps.preflight.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lead-hub-critical-playwright-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Skip notice
        if: steps.preflight.outputs.ready != 'true'
        run: echo "Lead Hub critical E2E skipped because required secrets are not configured."
